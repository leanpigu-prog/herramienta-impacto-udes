<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seguimiento de Impacto Institucional UDES 2024-2028</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --az:#003087;--do:#C8A951;--azl:#e8eef8;--az2:#1a4a9f;
  --vd:#2E7D32;--vdl:#E8F5E9;--am:#E65100;--aml:#FFF3E0;
  --ro:#B71C1C;--rol:#FFEBEE;--az3:#1565C0;--azl3:#E3F2FD;
  --gr:#546E7A;--grl:#ECEFF1;--borde:#DDE3ED;--bg:#F4F6FB;
  --txt:#1A2340;--txt2:#4A5568;--sombra:0 2px 8px rgba(0,48,135,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}

/* Header */
.hdr{background:var(--az);padding:0 20px;display:flex;align-items:center;gap:14px;
  box-shadow:0 2px 12px rgba(0,0,0,.18);position:sticky;top:0;z-index:100;height:62px}
.hdr-logo-box{background:#fff;border-radius:7px;padding:5px 10px;display:flex;align-items:center;flex-shrink:0}
.hdr-logo-img{height:38px;width:auto;display:block}
.hdr-sep{width:2px;height:28px;background:var(--do);border-radius:2px;flex-shrink:0}
.hdr-ttl{font-size:11.5px;color:rgba(255,255,255,.85);line-height:1.35}
.hdr-ttl strong{display:block;font-size:13px;color:#fff;font-weight:600}
.hdr-auto{margin-left:auto;font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.02em}

/* Tabs */
.tabs{background:#fff;border-bottom:2px solid var(--borde);padding:0 24px;display:flex}
.tab{padding:13px 22px;font-size:13px;font-weight:500;color:var(--txt2);border:none;background:none;
  cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--az)}
.tab.on{color:var(--az);border-bottom-color:var(--az);font-weight:600}
.tab-n{display:inline-block;background:var(--azl);color:var(--az);border-radius:10px;
  font-size:10px;font-weight:700;padding:1px 6px;margin-left:5px;vertical-align:middle}

/* Layout */
.wrap{max-width:1400px;margin:0 auto;padding:18px 20px 40px}

/* Info bar (tabs 1-3) */
.info-bar{display:flex;align-items:center;gap:12px;margin-bottom:14px;
  background:#fff;border:1px solid var(--borde);border-left:3px solid var(--az);
  border-radius:7px;padding:10px 16px;font-size:12.5px;color:var(--txt2)}
.info-bar strong{color:var(--az);font-size:13px}
.info-cnt{margin-left:auto;background:var(--azl);color:var(--az);border-radius:12px;
  padding:3px 12px;font-size:12px;font-weight:600}

/* Cards (tab Seguimiento) */
.cards{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.card{flex:1;min-width:150px;background:#fff;border-radius:9px;padding:13px 16px;
  box-shadow:var(--sombra);border-top:4px solid var(--borde)}
.card.ct{border-top-color:var(--az)}
.card.cv{border-top-color:var(--vd)}
.card.cp{border-top-color:var(--am)}
.card.cs{border-top-color:var(--gr)}
.card .n{font-size:28px;font-weight:700;line-height:1}
.card .l{font-size:11px;color:var(--txt2);margin-top:3px;font-weight:500}
.card.cv .n{color:var(--vd)}.card.cp .n{color:var(--am)}.card.cs .n{color:var(--gr)}

/* Nota LB */
.nota{font-size:11.5px;color:var(--txt2);background:#fff;border:1px solid var(--borde);
  border-left:3px solid var(--do);border-radius:6px;padding:8px 14px;margin-bottom:13px;line-height:1.5}

/* Tabla */
.tw{background:#fff;border-radius:10px;box-shadow:var(--sombra);overflow:auto;
  max-height:calc(100vh - 220px)}
table.ti{width:100%;border-collapse:collapse;font-size:13px}
table.ti thead th{background:var(--az);color:#fff;font-weight:600;font-size:11px;
  text-transform:uppercase;letter-spacing:.05em;padding:9px 10px;white-space:nowrap;
  position:sticky;top:0;z-index:10}
table.ti td{border-bottom:1px solid var(--borde);padding:7px 10px;vertical-align:middle}
table.ti tbody tr:last-child td{border-bottom:none}
table.ti tbody tr:hover td{background:var(--azl)!important}

/* Nivel */
.nv{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:#fff;writing-mode:vertical-lr;transform:rotate(180deg);text-align:center;
  padding:8px 5px;white-space:nowrap;min-width:28px}
.nv-i{background:#5C6BC0}.nv-p{background:#00897B}
.nv-pr{background:#F57C00}.nv-ir{background:#C62828}

/* Indicador */
.td-ind{min-width:220px;max-width:280px}
.i-nom{font-weight:500;color:var(--txt);cursor:help;border-bottom:1px dashed #aab}
.i-sub{display:block;font-size:10px;color:var(--txt2);margin-top:2px;font-style:italic}

/* Unidad */
.td-und{font-size:11px;color:var(--txt2);min-width:90px}

/* Valores readonly */
.td-val{font-size:13px;text-align:right;min-width:70px;color:var(--txt2)}
.td-meta{font-size:12px;color:var(--txt2);min-width:110px}

/* Función badge */
.fn-b{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.fn-inv{background:#e8eeff;color:#3949AB}
.fn-ens{background:#e8f5e9;color:#2E7D32}
.fn-ext{background:#fff3e0;color:#E65100}

/* Separador de función en Seguimiento */
.fn-sep td{background:#F0F4FF;font-weight:700;font-size:12px;color:var(--az);
  padding:7px 12px;letter-spacing:.03em}

/* Inputs */
.inp-v{width:78px;border:1px solid var(--borde);border-radius:5px;padding:5px 7px;
  font-size:13px;font-family:inherit;text-align:right;outline:none;transition:border-color .15s;background:#fff}
.inp-v:focus{border-color:var(--az);box-shadow:0 0 0 2px rgba(0,48,135,.10)}
.inp-obs{width:170px;border:1px solid var(--borde);border-radius:5px;padding:5px 7px;
  font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;background:#fff}
.inp-obs:focus{border-color:var(--az)}

/* % Avance */
.pct{display:inline-block;border-radius:12px;padding:2px 9px;font-size:12px;font-weight:600;min-width:50px;text-align:center}
.pct-g{background:var(--vdl);color:var(--vd)}
.pct-a{background:var(--aml);color:var(--am)}
.pct-r{background:var(--rol);color:var(--ro)}
.pct-n{background:var(--grl);color:var(--gr)}
.pct-az{background:var(--azl3);color:var(--az3)}

/* Estado */
.sel-e{border-radius:5px;padding:5px 8px;font-size:12px;font-family:inherit;
  border:1px solid var(--borde);cursor:pointer;outline:none;font-weight:500}

/* Row colors */
.row-sin_iniciar td{background:var(--rol)!important}
.row-en_proceso  td{background:var(--aml)!important}
.row-cumplida    td{background:var(--vdl)!important}
.row-superada    td{background:var(--azl3)!important}

/* Semáforo circular (Seguimiento) */
.sem{width:13px;height:13px;border-radius:50%;display:inline-block;vertical-align:middle;flex-shrink:0}
.sem-g{background:var(--vd)}.sem-a{background:var(--am)}.sem-r{background:var(--ro)}
.sem-az{background:var(--az3)}.sem-gr{background:#9E9E9E}

/* Barra de progreso inline */
.barra-wrap{display:inline-block;width:64px;height:6px;background:#dee3ec;border-radius:4px;vertical-align:middle;margin:0 4px;flex-shrink:0}
.barra-fill{display:block;height:6px;border-radius:4px;max-width:100%}
.barra-g{background:var(--vd)}.barra-a{background:var(--am)}.barra-r{background:var(--ro)}.barra-az{background:var(--az3)}

/* Progreso por función (Seguimiento) */
.prog-fns{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.prog-fn{flex:1;min-width:200px;background:#fff;border-radius:9px;padding:12px 16px;
  box-shadow:var(--sombra);border-left:4px solid var(--borde)}
.prog-fn.fn-inv-b{border-left-color:#3949AB}
.prog-fn.fn-ens-b{border-left-color:var(--vd)}
.prog-fn.fn-ext-b{border-left-color:var(--am)}
.prog-fn .pf-ttl{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.prog-fn .pf-bar{height:10px;background:#dee3ec;border-radius:5px;overflow:hidden;margin-bottom:6px}
.prog-fn .pf-fill{height:10px;border-radius:5px;transition:width .4s}
.prog-fn .pf-lbl{font-size:11px;color:var(--txt2);display:flex;justify-content:space-between}
.prog-fn .pf-lbl strong{color:var(--txt);font-size:13px}

/* Tabla de informe Seguimiento (readonly) */
.seg-fn-hdr td{background:var(--az);color:#fff;font-weight:700;font-size:11.5px;
  padding:8px 12px;letter-spacing:.04em}
.seg-ind-nom{font-weight:500;color:var(--txt);max-width:200px}
.celda-prog{white-space:nowrap}
.celda-prog .va{font-size:12px;font-weight:600;color:var(--txt);margin-right:2px}
.celda-prog .meta{font-size:11px;color:var(--txt2);margin-left:2px}

/* Toast */
#toast{position:fixed;bottom:22px;right:22px;background:#1A2340;color:#fff;border-radius:8px;
  padding:11px 18px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);
  opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;pointer-events:none;z-index:999}
#toast.on{opacity:1;transform:translateY(0)}

/* Controles PDF */
.barra-controles{display:flex;align-items:center;gap:12px;padding:10px 16px;
  background:#fff;border:1px solid var(--borde);border-left:3px solid var(--az);
  border-radius:7px;margin-bottom:13px;flex-wrap:wrap}
.sel-vr{border:1px solid var(--borde);border-radius:5px;padding:6px 10px;
  font-size:13px;font-family:inherit;outline:none;cursor:pointer;background:#fff}
.btn-pdf{background:var(--az);color:#fff;border:none;border-radius:6px;
  padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto}
.btn-pdf:hover{background:var(--az2)}

.tw.pdf-mode{max-height:none!important;overflow:visible!important}

/* Impresión */
@media print{
  .hdr{position:relative!important;box-shadow:none!important;height:auto!important;padding:10px 20px!important}
  .tabs,.barra-controles,.hdr-auto,.hdr-sep{display:none!important}
  .wrap{padding:10px!important;max-width:none!important}
  .tw{max-height:none!important;overflow:visible!important;box-shadow:none!important;border-radius:0!important}
  table.ti thead th{background:var(--az)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .nv,.seg-fn-hdr td,.row-cumplida td,.row-superada td,.row-en_proceso td,.row-sin_iniciar td{
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  .barra-fill,.barra-g,.barra-a,.barra-r,.sem-g,.sem-a,.sem-r,.sem-az{
    -webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr{page-break-inside:avoid}
  .no-print{display:none!important}
  .wrap::before{content:attr(data-titulo);display:block;font-size:14px;font-weight:700;
    color:var(--az);margin-bottom:10px;border-bottom:2px solid var(--do);padding-bottom:6px}
}

@media(max-width:700px){.wrap{padding:10px}.tabs{padding:0 10px}.tab{padding:11px 14px}}
</style>
</head>

// ─── Config ────────────────────────────────────────────────
const ORDEN_NIV = ['Insumos','Procesos','Productos','Impacto Real'];
const CSS_NIV   = {Insumos:'nv-i',Procesos:'nv-p',Productos:'nv-pr','Impacto Real':'nv-ir'};
const FUN_LBL   = {INV:'Investigación',ENS:'Enseñanza',EXT:'Extensión'};
const FUN_CSS   = {INV:'fn-inv',ENS:'fn-ens',EXT:'fn-ext'};
const ESTADOS   = {'':['Sin dato',''],sin_iniciar:['Sin iniciar','var(--ro)'],
  en_proceso:['En proceso','var(--am)'],cumplida:['Cumplida','var(--vd)'],
  superada:['Superada','var(--az3)']};

// ─── Store ─────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzSnZcGRWwIredYFRPY1Np9jtb_TCyhdGx430N6QbAPuHvU84w5PoLmyVLuAGIxvQ6eIA/exec';

let store = {};
let tabActual = 'inv';

function buildRows(){
  return IND.map(ind=>({
    id:     ind.id,
    funcion: ind.f,
    lb:     store[ind.id+'_lb']??'',
    va26:   store[ind.id+'_va26']??'',
    va28:   store[ind.id+'_va28']??'',
    estado: store[ind.id+'_e']??'',
    obs:    store[ind.id+'_o']??''
  })).filter(r=>r.va26!==''||r.va28!==''||r.estado!==''||r.obs!=='');
}

function cargarDeSheets(){
  const hdr=document.getElementById('hdr-auto');
  hdr.textContent='Cargando datos...';
  fetch(APPS_SCRIPT_URL)
    .then(r=>r.json())
    .then(res=>{
      if(res.ok && res.data.length){
        res.data.forEach(row=>{
          if(row.lb)     store[row.id+'_lb']=String(row.lb);
          if(row.va26)   store[row.id+'_va26']=String(row.va26);
          if(row.va28)   store[row.id+'_va28']=String(row.va28);
          if(row.estado) store[row.id+'_e']=row.estado;
          if(row.obs)    store[row.id+'_o']=String(row.obs);
        });
        localStorage.setItem('imp_store',JSON.stringify(store));
        hdr.textContent='Datos cargados desde Sheets ✓';
      } else {
        hdr.textContent='Cambios guardados automáticamente';
      }
      setTimeout(()=>hdr.textContent='Cambios guardados automáticamente',2500);
      irTab('inv', document.querySelector('.tab.on'));
    })
    .catch(()=>{
      hdr.textContent='Sin conexión — datos locales';
      setTimeout(()=>hdr.textContent='Cambios guardados automáticamente',2500);
      irTab('inv', document.querySelector('.tab.on'));
    });
}

window.addEventListener('load',()=>{
  const g = localStorage.getItem('imp_store');
  if(g) try{store=JSON.parse(g);}catch(e){}
  cargarDeSheets();
});

// ─── Navegación ────────────────────────────────────────────
function irTab(t, btn){
  tabActual = t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  const lista = t==='inv'?IND.filter(i=>i.f==='INV')
               :t==='ens'?IND.filter(i=>i.f==='ENS')
               :t==='ext'?IND.filter(i=>i.f==='EXT')
               :IND;
  if(t==='seg') renderSeg(IND);
  else           renderEd(lista, t.toUpperCase());
}

// ─── Tabla editable (tabs INV / ENS / EXT) ────────────────
function renderEd(lista, f){
  const funNombre = FUN_LBL[f];
  const ni = lista.length;
  let cumpl=0,proce=0,sinD=0;
  lista.forEach(ind=>{
    const e=store[ind.id+'_e']||'';
    if(e==='cumplida'||e==='superada') cumpl++;
    else if(e==='en_proceso'||e==='sin_iniciar') proce++;
    else sinD++;
  });
  document.getElementById('zona-info').innerHTML=
    `<div class="cards">
       <div class="card ct"><div class="n">${ni}</div><div class="l">${funNombre}</div></div>
       <div class="card cv"><div class="n">${cumpl}</div><div class="l">Cumplidos / Superados</div></div>
       <div class="card cp"><div class="n">${proce}</div><div class="l">En seguimiento</div></div>
       <div class="card cs"><div class="n">${sinD}</div><div class="l">Sin dato registrado</div></div>
     </div>`;
  const sinLB = lista.filter(ind=>{const v=store[ind.id+'_lb']; return v===undefined||v===''}).length;
  const notaEl=document.getElementById('zona-nota');
  notaEl.style.display='';
  notaEl.innerHTML=(sinLB>0?`<div style="background:#FFF3E0;border-left:3px solid #E65100;border-radius:6px;padding:8px 14px;margin-bottom:8px;font-size:12.5px;color:#4A5568"><strong style="color:#E65100">Atenci&oacute;n:</strong> ${sinLB} indicador${sinLB>1?'es':''} sin l&iacute;nea base. Sin ella, el % de avance no podr&aacute; calcularse correctamente para metas expresadas como variaci&oacute;n respecto a LB.</div>`:'')+
    'Ingrese la línea base 2023 y el valor real obtenido para 2026 y 2028. El % de avance se calcula automáticamente cuando la meta es numérica. Los datos se guardan automáticamente en este navegador.';

  document.getElementById('thead').innerHTML=`<tr>
    <th style="min-width:28px">Nivel</th>
    <th style="text-align:left;min-width:230px">Indicador</th>
    <th>Unidad</th>
    <th style="text-align:right;background:#dbeafe">LB 2023</th>
    <th style="text-align:right;background:#dbeafe">Valor 2026</th>
    <th style="text-align:right">Meta 2026</th>
    <th style="text-align:center">% 2026</th>
    <th style="text-align:right;background:#dbeafe">Valor 2028</th>
    <th style="text-align:right">Meta 2028</th>
    <th style="text-align:center">% 2028</th>
    <th>Estado</th>
    <th style="text-align:left">Observaciones</th>
  </tr>`;

  const grupos={};
  ORDEN_NIV.forEach(n=>{grupos[n]=lista.filter(i=>i.niv===n);});
  let rows='';
  ORDEN_NIV.forEach(niv=>{
    const inds=grupos[niv];
    if(!inds.length) return;
    inds.forEach((ind,idx)=>{
      const lbVal = store[ind.id+'_lb'] ?? '';
      const va26 = store[ind.id+'_va26'] ?? '';
      const va28 = store[ind.id+'_va28'] ?? '';
      const est  = store[ind.id+'_e']    ?? '';
      const obs  = store[ind.id+'_o']    ?? '';
      rows+=`<tr class="${est?'row-'+est:''}" id="row-${ind.id}">`;
      if(idx===0) rows+=`<td class="nv ${CSS_NIV[niv]}" rowspan="${inds.length}">${niv}</td>`;
      rows+=`<td class="td-ind"><span class="i-nom" title="${esc(ind.desc)}">${esc(ind.ind)}</span></td>`;
      rows+=`<td class="td-und">${ind.und}</td>`;
      rows+=`<td style="background:#f0f5ff"><input class="inp-v" type="text" value="${esc(String(lbVal))}"
        onchange="setVal('${ind.id}','lb',this.value)" placeholder="—" title="Línea Base 2023"></td>`;
      rows+=`<td style="background:#f0f5ff"><input class="inp-v" type="text" value="${esc(va26)}"
        onchange="setVal('${ind.id}','va26',this.value)" title="Valor real 2026"></td>`;
      rows+=`<td class="td-meta">${fmtM(ind.m26)}</td>`;
      rows+=`<td style="text-align:center" id="pct26-${ind.id}">${pctHtml(calcPct(va26,ind.m26))}</td>`;
      rows+=`<td style="background:#f0f5ff"><input class="inp-v" type="text" value="${esc(va28)}"
        onchange="setVal('${ind.id}','va28',this.value)" title="Valor real 2028"></td>`;
      rows+=`<td class="td-meta">${fmtM(ind.m28)}</td>`;
      rows+=`<td style="text-align:center" id="pct28-${ind.id}">${pctHtml(calcPct(va28,ind.m28))}</td>`;
      rows+=`<td><select class="sel-e" onchange="setEst('${ind.id}',this.value)">
        ${Object.entries(ESTADOS).map(([k,[l]])=>`<option value="${k}" ${est===k?'selected':''}>${l}</option>`).join('')}
      </select></td>`;
      rows+=`<td><input class="inp-obs" type="text" value="${esc(obs)}"
        placeholder="Observación..." onchange="setVal('${ind.id}','o',this.value)"></td>`;
      rows+='</tr>';
    });
  });
  document.getElementById('tbody').innerHTML=rows;
}

// ─── Dashboard de Seguimiento (tab SEG — solo lectura visual) ─
function semCls(est){
  return est==='cumplida'?'sem-g':est==='superada'?'sem-az':est==='en_proceso'?'sem-a':est==='sin_iniciar'?'sem-r':'sem-gr';
}
function barraCls(pct){
  if(pct===null) return 'barra-gr';
  return pct>=80?'barra-g':pct>=50?'barra-a':'barra-r';
}
function barraHtml(va, meta){
  const pct=calcPct(va,meta);
  const w=pct===null?0:Math.min(pct,100);
  const cls=barraCls(pct);
  return `<span class="va">${va!==''?va:'—'}</span>`+
         `<span class="barra-wrap"><span class="barra-fill ${cls}" style="width:${w}%"></span></span>`+
         `<span class="meta">${fmtM(meta)}</span>`;
}

function renderSeg(lista){
  const total=lista.length;
  let cumpl=0,proce=0,sinD=0;
  lista.forEach(ind=>{
    const e=store[ind.id+'_e']||'';
    if(e==='cumplida'||e==='superada') cumpl++;
    else if(e==='en_proceso'||e==='sin_iniciar') proce++;
    else sinD++;
  });

  // Barras por función
  const progFns = ['INV','ENS','EXT'].map(f=>{
    const indsF=lista.filter(i=>i.f===f);
    let fc=0;
    indsF.forEach(i=>{const e=store[i.id+'_e']||''; if(e==='cumplida'||e==='superada') fc++;});
    const pct=indsF.length?Math.round(fc/indsF.length*100):0;
    const cls=f==='INV'?'fn-inv-b':f==='ENS'?'fn-ens-b':'fn-ext-b';
    const fillCls=pct>=80?'barra-g':pct>=50?'barra-a':'barra-r';
    return `<div class="prog-fn ${cls}">
      <div class="pf-ttl">${FUN_LBL[f]}</div>
      <div class="pf-bar"><div class="pf-fill ${fillCls}" style="width:${pct}%"></div></div>
      <div class="pf-lbl"><span><strong>${fc}</strong> / ${indsF.length} cumplidos</span><strong>${pct}%</strong></div>
    </div>`;
  }).join('');

  document.getElementById('zona-info').innerHTML=
    `<div class="cards">
       <div class="card ct"><div class="n">${total}</div><div class="l">Total indicadores</div></div>
       <div class="card cv"><div class="n">${cumpl}</div><div class="l">Cumplidos / Superados</div></div>
       <div class="card cp"><div class="n">${proce}</div><div class="l">En seguimiento</div></div>
       <div class="card cs"><div class="n">${sinD}</div><div class="l">Sin dato registrado</div></div>
     </div>
     <div class="prog-fns">${progFns}</div>`;

  const notaEl=document.getElementById('zona-nota');
  notaEl.style.display='';
  notaEl.innerHTML=`<div class="barra-controles">
    <label style="font-size:13px;font-weight:500;color:var(--txt2)">Generar boletín:</label>
    <select id="sel-vr" class="sel-vr">
      <option value="">Todas las Vicerrectorías</option>
      <option value="INV">Investigación</option>
      <option value="ENS">Enseñanza</option>
      <option value="EXT">Extensión</option>
    </select>
    <button class="btn-pdf" onclick="descargarPDF()">&#11123; Descargar PDF</button>
  </div>`;

  document.getElementById('thead').innerHTML=`<tr>
    <th style="width:14px"></th>
    <th>Func.</th>
    <th style="min-width:28px">Nivel</th>
    <th style="text-align:left;min-width:200px">Indicador</th>
    <th>Unidad</th>
    <th style="text-align:right">LB 2023</th>
    <th style="text-align:left;min-width:180px">Val. 2026 · Meta 2026</th>
    <th style="text-align:center">% 2026</th>
    <th style="text-align:left;min-width:180px">Val. 2028 · Meta 2028</th>
    <th style="text-align:center">% 2028</th>
    <th>Estado</th>
    <th style="text-align:left">Observaciones</th>
  </tr>`;

  const FUNCS=['INV','ENS','EXT'];
  let rows='';
  FUNCS.forEach(f=>{
    const indsF=lista.filter(i=>i.f===f);
    rows+=`<tr class="seg-fn-hdr" data-f="${f}"><td colspan="12">${FUN_LBL[f].toUpperCase()} — ${indsF.length} indicadores</td></tr>`;
    const grupos={};
    ORDEN_NIV.forEach(n=>{grupos[n]=indsF.filter(i=>i.niv===n);});
    ORDEN_NIV.forEach(niv=>{
      const inds=grupos[niv];
      if(!inds.length) return;
      inds.forEach((ind,idx)=>{
        const lbDisp = store[ind.id+'_lb'] ?? '';
        const va26 = store[ind.id+'_va26']||'';
        const va28 = store[ind.id+'_va28']||'';
        const est  = store[ind.id+'_e']||'';
        const obs  = store[ind.id+'_o']||'';
        const pct26=calcPct(va26,ind.m26);
        const pct28=calcPct(va28,ind.m28);
        rows+=`<tr class="${est?'row-'+est:''}" data-f="${f}">`;
        rows+=`<td style="padding:6px 8px"><span class="sem ${semCls(est)}"></span></td>`;
        rows+=`<td><span class="fn-b ${FUN_CSS[f]}">${f}</span></td>`;
        if(idx===0) rows+=`<td class="nv ${CSS_NIV[niv]}" rowspan="${inds.length}">${niv}</td>`;
        rows+=`<td class="td-ind seg-ind-nom" title="${esc(ind.desc)}">${esc(ind.ind)}</td>`;
        rows+=`<td class="td-und">${ind.und}</td>`;
        rows+=`<td class="td-val">${lbDisp!==''?`<span style="font-weight:500">${lbDisp}</span>`:'<span style="color:#aaa">—</span>'}</td>`;
        rows+=`<td class="celda-prog">${barraHtml(va26,ind.m26)}</td>`;
        rows+=`<td style="text-align:center">${pctHtml(pct26)}</td>`;
        rows+=`<td class="celda-prog">${barraHtml(va28,ind.m28)}</td>`;
        rows+=`<td style="text-align:center">${pctHtml(pct28)}</td>`;
        rows+=`<td><span class="pct ${est?'pct-'+{'cumplida':'g','superada':'az','en_proceso':'a','sin_iniciar':'r'}[est]||'n':'pct-n'}" style="font-size:11px">${ESTADOS[est]?ESTADOS[est][0]:'Sin dato'}</span></td>`;
        rows+=`<td style="font-size:11px;color:var(--txt2)">${esc(obs)||'—'}</td>`;
        rows+='</tr>';
      });
    });
  });
  document.getElementById('tbody').innerHTML=rows;
}

// ─── Helpers de datos ──────────────────────────────────────
function calcPct(va, meta){
  const v=parseFloat(String(va).replace(',','.'));
  const m=parseFloat(String(meta).replace(',','.'));
  if(isNaN(v)||isNaN(m)||m===0) return null;
  return Math.round((v/m)*100);
}
function pctHtml(pct){
  if(pct===null) return '<span class="pct pct-n">—</span>';
  const cls=pct>=80?'pct-g':pct>=50?'pct-a':'pct-r';
  return `<span class="pct ${cls}">${pct}%</span>`;
}
function fmtLB(v){
  if(v==null) return '<span style="color:#aaa">Por definir</span>';
  return `<span style="font-weight:500">${v}</span>`;
}
function fmtM(v){
  if(v==null) return '<span style="color:#aaa">—</span>';
  return String(v);
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Guardar en store ──────────────────────────────────────
function setVal(id, campo, val){
  store[id+'_'+campo]=val;
  save();
  const ind = IND.find(i=>i.id===id);
  if(!ind) return;
  if(campo==='va26'){
    const el=document.getElementById('pct26-'+id);
    if(el) el.innerHTML=pctHtml(calcPct(val,ind.m26));
    if(val!==''&&(store[id+'_lb']===undefined||store[id+'_lb']===''))
      toast('Sin línea base — el avance podría no calcularse correctamente');
  }
  if(campo==='va28'){
    const el=document.getElementById('pct28-'+id);
    if(el) el.innerHTML=pctHtml(calcPct(val,ind.m28));
    if(val!==''&&(store[id+'_lb']===undefined||store[id+'_lb']===''))
      toast('Sin línea base — el avance podría no calcularse correctamente');
  }
}

function setEst(id, val){
  store[id+'_e']=val;
  save();
  const fila=document.getElementById('row-'+id);
  if(fila) fila.className=val?'row-'+val:'';
  // Cards del tab activo (filtrar por función si es INV/ENS/EXT)
  const ind=IND.find(i=>i.id===id);
  if(!ind) return;
  const lista=tabActual==='seg'?IND:IND.filter(i=>i.f===ind.f);
  let cumpl=0,proce=0,sinD=0;
  lista.forEach(i=>{
    const e=store[i.id+'_e']||'';
    if(e==='cumplida'||e==='superada') cumpl++;
    else if(e==='en_proceso'||e==='sin_iniciar') proce++;
    else sinD++;
  });
  const q=s=>document.querySelector(s);
  q('.card.cv .n')&&(q('.card.cv .n').textContent=cumpl);
  q('.card.cp .n')&&(q('.card.cp .n').textContent=proce);
  q('.card.cs .n')&&(q('.card.cs .n').textContent=sinD);
}

function save(){
  localStorage.setItem('imp_store', JSON.stringify(store));
  const hdr=document.getElementById('hdr-auto');
  hdr.textContent='Guardado localmente ✓';
  clearTimeout(save._t);
  save._t=setTimeout(()=>{
    const rows=buildRows();
    if(!rows.length){ hdr.textContent='Cambios guardados automáticamente'; return; }
    hdr.textContent='Sincronizando con Sheets...';
    fetch(APPS_SCRIPT_URL,{
      method:'POST',
      body:JSON.stringify({action:'upsert',rows})
    })
    .then(r=>r.json())
    .then(res=>{
      hdr.textContent=res.ok?'Guardado en Sheets ✓':'Error al guardar en Sheets';
      setTimeout(()=>hdr.textContent='Cambios guardados automáticamente',2500);
    })
    .catch(()=>{
      hdr.textContent='Sin conexión — guardado solo local';
      setTimeout(()=>hdr.textContent='Cambios guardados automáticamente',2500);
    });
  },3000);
}

function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),3000);
}

function descargarPDF(){
  const f=(document.getElementById('sel-vr')||{}).value||'';
  const titulos={'':'Todas las Vicerrectorías',INV:'Vicerrectoría de Investigación',
    ENS:'Vicerrectoría de Enseñanza',EXT:'Vicerrectoría de Extensión'};
  const archivos={'':'Todas-VR',INV:'Investigacion',ENS:'Ensenanza',EXT:'Extension'};

  document.querySelectorAll('tr[data-f]').forEach(tr=>{
    tr.style.display=(f && tr.dataset.f!==f)?'none':'';
  });

  const tw=document.querySelector('.tw');
  const controles=document.querySelector('.barra-controles');
  const zonaInfo=document.getElementById('zona-info');
  tw.classList.add('pdf-mode');
  tw.style.overflow='visible';
  tw.style.maxHeight='none';
  tw.style.borderRadius='0';
  document.querySelectorAll('thead th').forEach(th=>th.style.position='relative');
  if(controles) controles.style.display='none';
  if(zonaInfo) zonaInfo.style.display='none';

  const logoImg=document.querySelector('.hdr-logo-img');
  const logoSrc=logoImg?logoImg.src:'';
  const tit=document.createElement('div');
  tit.id='pdf-tit';
  tit.style.cssText='margin-bottom:12px;padding-top:4px';
  tit.innerHTML=`<div style="display:flex;align-items:center;gap:14px;padding-bottom:8px;border-bottom:2px solid #C8A951">`+
    (logoSrc?`<img src="${logoSrc}" style="height:40px;width:auto;display:block">`:'')+
    `<div><div style="font-size:14px;font-weight:700;color:#003087;line-height:1.2">Seguimiento de Impacto Institucional UDES 2024-2028</div>`+
    `<div style="font-size:12px;color:#546E7A;margin-top:3px">${titulos[f]}</div></div></div>`;
  document.querySelector('.wrap').prepend(tit);

  const btn=document.querySelector('.btn-pdf');
  if(btn){btn.disabled=true;btn.textContent='Generando...';}

  html2pdf().set({
    margin:[8,6,8,6],
    filename:'Boletin-Impacto-UDES-'+archivos[f]+'.pdf',
    image:{type:'jpeg',quality:0.97},
    html2canvas:{scale:2,useCORS:true,logging:false,scrollY:0,windowWidth:document.documentElement.offsetWidth},
    jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},
    pagebreak:{mode:['avoid-all','css']}
  }).from(document.querySelector('.wrap')).save()
  .then(()=>{
    tw.classList.remove('pdf-mode');
    tw.style.overflow='';
    tw.style.maxHeight='';
    tw.style.borderRadius='';
    document.querySelectorAll('thead th').forEach(th=>th.style.position='');
    document.querySelectorAll('tr[data-f]').forEach(tr=>tr.style.display='');
    if(controles) controles.style.display='';
    if(zonaInfo) zonaInfo.style.display='';
    const t=document.getElementById('pdf-tit'); if(t) t.remove();
    if(btn){btn.disabled=false;btn.innerHTML='&#11123; Descargar PDF';}
  });
}
</script>
